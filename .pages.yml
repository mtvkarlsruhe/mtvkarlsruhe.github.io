media:
  input: static/img
  output: /img

content:
  - name: pages
    label: Seiten
    type: collection
    path: content/de
    filename: '{primary}.md'
    view:
      fields: [title, description, date]
      sort: [title, date]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: Titel
        type: string
        required: true
      - name: description
        label: Beschreibung
        type: text
        description: Wird für SEO und Vorschau verwendet.
      - name: date
        label: Datum
        type: date
        options:
          format: yyyy-MM-dd
      - name: showHeader
        label: Header anzeigen
        type: boolean
        default: true
      - name: body
        label: Inhalt
        type: code
        options:
          language: markdown
